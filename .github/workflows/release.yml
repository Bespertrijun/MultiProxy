name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: agent-linux-x86_64
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            artifact: agent-linux-aarch64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild -p agent --release --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/agent ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p panel
      - run: cp target/release/panel panel-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: panel-linux-x86_64
          path: panel-linux-x86_64

  release:
    needs: [build, build-panel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: cp scripts/install-panel.sh install-panel.sh && cp scripts/install-agent.sh install-agent.sh
      - run: ls -lh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            panel-linux-x86_64
            agent-linux-x86_64
            agent-linux-aarch64
            install-panel.sh
            install-agent.sh
          generate_release_notes: true
